<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <style>
      .bg{fill:#0f172a}
      .brick{fill:#ef4444;stroke:#0b1220;stroke-width:2}
      .paddle{fill:#fbbf24}
      .ball{fill:#ffffff}
      .title{font-family:Roboto, Arial, sans-serif; font-size:22px; fill:url(#g); font-weight:700}
    </style>
  </defs>
  <rect width="100%" height="100%" rx="12" ry="12" class="bg"/>
  <g transform="translate(28,36)">
    <rect x="0" y="0" width="44" height="20" class="brick" rx="2"/>
    <rect x="52" y="0" width="44" height="20" class="brick" rx="2"/>
    <rect x="104" y="0" width="44" height="20" class="brick" rx="2"/>
    <rect x="156" y="0" width="44" height="20" class="brick" rx="2"/>
    <rect x="208" y="0" width="44" height="20" class="brick" rx="2"/>

    <rect x="26" y="28" width="44" height="20" class="brick" rx="2"/>
    <rect x="78" y="28" width="44" height="20" class="brick" rx="2"/>
    <rect x="130" y="28" width="44" height="20" class="brick" rx="2"/>

    <rect x="80" y="100" width="120" height="18" class="paddle" rx="8"/>
    <circle cx="200" cy="90" r="8" class="ball"/>
  </g>
  <text x="50%" y="92%" text-anchor="middle" class="title">Brick Breaker</text>
</svg>
