name: Lighthouse CI
on: [pull_request]
jobs:
  lhci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npx http-server -p 8080 -c-1 .
      - run: npx @lhci/cli autorun --collect.url=http://localhost:8080/index.html
